<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>LHI Lecce NFT - Mint Frontend</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      padding: 20px;
      text-align: center;
    }
    h1 {
      color: crimson;
      font-size: 1.5em;
      margin-bottom: 0.2em;
    }
    .subtitle {
      font-size: 1.2em;
      margin: 0.3em 0;
    }
    .green { color: green; font-weight: bold; }
    .red { color: red; font-weight: bold; }
    .darkgreen { color: darkgreen; font-weight: bold; }
    .preview-container {
      margin: 20px auto;
      border: 4px solid blue;
      width: 350px;
      height: 350px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #preview {
      max-width: 100%;
      max-height: 100%;
    }
    .button-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      justify-items: center;
      margin: 20px auto;
      max-width: 400px;
    }
    .img-btn {
      background-color: #00bcd4;
      color: white;
      border: none;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
    }
    .img-btn:hover {
      background-color: #0097a7;
    }
    .controls {
      margin-top: 20px;
    }
    #log {
      margin-top: 20px;
      background: #f1f1f1;
      padding: 10px;
      border-radius: 5px;
      min-height: 40px;
    }
  </style>
</head>
<body>
  <h1>LHI Lecce Medical Hotel Italia</h1>
  <div class="subtitle"><a href="https://lhilecce.it" target="_blank">lhilecce.it</a></div>
  <div class="subtitle green">CROWNFUNDING INTERNATIONAL su blockchain Polygon (Matic-Ethereum)</div>
  <div class="subtitle red">PROGETTO DI RICERCA MEDICA: <span class="red">FIBROMIALGIA</span> & <span class="darkgreen">DEPRESSIONE</span></div>
  <div class="subtitle">
    <a href="https://maps.app.goo.gl/mJDgv9wgqtEVovZGA" target="_blank">Esplora Posizione su Google Maps</a>
  </div>

  <div class="preview-container">
    <img id="preview" src="images/01.jpg" alt="Anteprima NFT" />
  </div>

  <div class="button-grid" id="button-grid"></div>

  <div class="controls">
    <button id="connect-btn">Connetti Metamask</button>
    <input type="number" id="quantity" value="1" min="1" max="10" />
    <button id="mint-btn" disabled>Mint NFT</button>
  </div>

  <div id="log">Status: In attesa di connessione...</div>

  <script>
    const CONTRACT_ADDRESS = "0x6a6d5Dc29ad8ff23209186775873e123b31c26E9";
    const CONTRACT_ABI = [
      {"inputs":[{"internalType":"string","name":"_baseURI","type":"string"},{"internalType":"address","name":"_owner","type":"address"},{"internalType":"address","name":"_paymentToken","type":"address"}],"stateMutability":"nonpayable","type":"constructor"},
      {"inputs":[{"internalType":"uint256","name":"tokenId","type":"uint256"},{"internalType":"uint256","name":"amount","type":"uint256"},{"internalType":"bool","name":"stake","type":"bool"}],"name":"mintNFT","outputs":[],"stateMutability":"payable","type":"function"},
      {"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"pricesInWei","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"}
    ];

    let provider, signer, contract;
    const previewImg = document.getElementById('preview');
    const buttonGrid = document.getElementById('button-grid');
    const connectBtn = document.getElementById('connect-btn');
    const mintBtn = document.getElementById('mint-btn');
    const quantityInput = document.getElementById('quantity');
    const logDiv = document.getElementById('log');

    let currentTokenId = 1;

    function log(message) {
      logDiv.textContent = message;
    }

    function updatePreview(id) {
      const padded = id.toString().padStart(2, '0');
      const extensions = ['.jpg', '.JPG'];
      for (const ext of extensions) {
        const url = `images/${padded}${ext}`;
        fetch(url, { method: 'HEAD' }).then(res => {
          if (res.ok) previewImg.src = url;
        });
      }
    }

    for (let i = 1; i <= 24; i++) {
      const btn = document.createElement('button');
      btn.textContent = i;
      btn.className = 'img-btn';
      btn.onclick = () => {
        currentTokenId = i;
        updatePreview(i);
      };
      buttonGrid.appendChild(btn);
    }

    connectBtn.onclick = async () => {
      if (!window.ethereum) {
        log('❌ Installa Metamask.');
        return;
      }
      try {
        await window.ethereum.request({ method: 'eth_requestAccounts' });
        provider = new ethers.providers.Web3Provider(window.ethereum);
        signer = provider.getSigner();
        contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
        log('✅ Connesso a Metamask!');
        mintBtn.disabled = false;
      } catch (err) {
        log('❌ Errore connessione: ' + err.message);
      }
    };

    mintBtn.onclick = async () => {
      const quantity = parseInt(quantityInput.value);
      try {
        const price = await contract.pricesInWei(currentTokenId);
        const totalPrice = price.mul(quantity);
        log(`⏳ Minting token ${currentTokenId}...`);
        const tx = await contract.mintNFT(currentTokenId, quantity, false, { value: totalPrice });
        await tx.wait();
        log('✅ Mint completato! Hash: ' + tx.hash);
      } catch (err) {
        log('❌ Errore mint: ' + (err.data?.message || err.message));
      }
    };
  </script>
</body>
</html>
