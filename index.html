<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>LHI Lecce NFT - Mint Frontend</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      padding: 20px;
      text-align: center;
    }
    .header {
      font-weight: bold;
      font-size: 1.1em;
      margin-bottom: 10px;
    }
    .header .lhi {
      color: #a30000;
    }
    .header .cf {
      color: green;
    }
    .header .fibro {
      color: red;
      font-weight: bold;
    }
    .header .dep {
      color: darkgreen;
      font-weight: bold;
    }
    .preview {
      margin: 20px auto;
      width: 350px;
      height: 350px;
      border: 3px solid blue;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview img {
      max-width: 100%;
      max-height: 100%;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      max-width: 600px;
      margin: auto;
      margin-top: 20px;
    }
    .grid button {
      background-color: #00bcd4;
      color: white;
      border: none;
      padding: 15px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }
    #mint-btn, #connect-btn {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      background-color: #00bcd4;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #log {
      margin-top: 20px;
      background: #f1f1f1;
      padding: 10px;
      border-radius: 5px;
      min-height: 40px;
    }
    a {
      color: #0055aa;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="header">
    <div><span class="lhi">LHI Lecce Medical Hotel Italia.</span> <a href="https://lhilecce.it" target="_blank">lhilecce.it</a></div>
    <div><span class="cf">Crownfounding International</span> su blockchain Polygon (Matic-Ethereum)</div>
    <div><span class="fibro">FIBROMIALGIA</span> & <span class="dep">DEPRESSIONE</span></div>
    <div><a href="https://maps.app.goo.gl/mJDgv9wgqtEVovZGA" target="_blank">📍 Esplora Posizione</a></div>
  </div>

  <div class="preview" id="preview-box">
    <img id="preview" src="" alt="Anteprima NFT">
  </div>

  <div class="grid" id="button-grid">
    <!-- Generato via JavaScript -->
  </div>

  <input type="number" id="quantity" value="1" min="1" max="10" />
  <br>
  <button id="connect-btn">Connetti Metamask</button>
  <button id="mint-btn" disabled>Mint NFT</button>
  <div id="log">Status: In attesa di connessione...</div>

  <script>
    const CONTRACT_ADDRESS = "0x6a6d5Dc29ad8ff23209186775873e123b31c26E9";
    const IPFS_CID = "bafybeihtvxoq6ak2yaayltdcpxz6fh5rdrzptmygdvhxhz6ai73tsj26yi";
    const CONTRACT_ABI = [
      {"inputs":[{"internalType":"string","name":"_baseURI","type":"string"},{"internalType":"address","name":"_owner","type":"address"},{"internalType":"address","name":"_paymentToken","type":"address"}],"stateMutability":"nonpayable","type":"constructor"},
      {"inputs":[{"internalType":"uint256","name":"tokenId","type":"uint256"},{"internalType":"uint256","name":"amount","type":"uint256"},{"internalType":"bool","name":"stake","type":"bool"}],"name":"mintNFT","outputs":[],"stateMutability":"payable","type":"function"},
      {"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"pricesInWei","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"}
    ];

    let provider, signer, contract;

    const previewImg = document.getElementById("preview");
    const logDiv = document.getElementById("log");
    const mintBtn = document.getElementById("mint-btn");
    const connectBtn = document.getElementById("connect-btn");
    const quantityInput = document.getElementById("quantity");

    connectBtn.onclick = async () => {
      if (!window.ethereum) return log("❌ Installa Metamask.");
      try {
        await ethereum.request({ method: "eth_requestAccounts" });
        provider = new ethers.providers.Web3Provider(window.ethereum);
        signer = provider.getSigner();
        contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
        log("✅ Connesso a Metamask!");
        mintBtn.disabled = false;
      } catch (err) {
        log("❌ Errore connessione: " + err.message);
      }
    };

    mintBtn.onclick = async () => {
      const tokenId = parseInt(previewImg.alt?.split("#")[1]);
      const quantity = parseInt(quantityInput.value);
      try {
        const price = await contract.pricesInWei(tokenId);
        const total = price.mul(quantity);
        log(`⏳ Minting token ${tokenId}...`);
        const tx = await contract.mintNFT(tokenId, quantity, false, { value: total });
        await tx.wait();
        log("✅ Mint completato! Hash: " + tx.hash);
      } catch (err) {
        log("❌ Errore mint: " + (err.data?.message || err.message));
      }
    };

    async function selectImage(tokenId) {
      const padded = tokenId.toString().padStart(2, '0');
      const extensions = ['.jpg', '.JPG'];
      previewImg.src = '';
      previewImg.alt = '';
      log('🔍 Caricamento anteprima...');

      for (const ext of extensions) {
        const url = `https://gateway.pinata.cloud/ipfs/${IPFS_CID}/${padded}${ext}`;
        try {
          const res = await fetch(url, { method: 'HEAD' });
          if (res.ok) {
            previewImg.src = url;
            previewImg.alt = `LHI #${tokenId}`;
            log(`✅ Anteprima caricata per Token #${tokenId}`);
            return;
          }
        } catch {}
      }

      previewImg.src = '';
      previewImg.alt = '';
      log('⚠️ Anteprima non trovata.');
    }

    function log(message) {
      logDiv.textContent = message;
    }

    window.onload = () => {
      const grid = document.getElementById("button-grid");
      for (let i = 1; i <= 24; i++) {
        const btn = document.createElement("button");
        btn.textContent = i;
        btn.onclick = () => selectImage(i);
        grid.appendChild(btn);
      }
      selectImage(1);
    };
  </script>
</body>
</html>
