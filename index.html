<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>LHI Lecce NFT - Mint Frontend</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      padding: 20px;
      text-align: center;
    }
    .header-text {
      font-weight: bold;
      font-size: 80%;
      color: red;
      margin-bottom: 5px;
    }
    .link-line a {
      color: blue;
      text-decoration: none;
      font-weight: bold;
    }
    .description {
      font-size: 110%;
      font-weight: bold;
      margin-top: 10px;
    }
    .green { color: green; }
    .red { color: red; }
    .darkgreen { color: darkgreen; }
    .container {
      max-width: 600px;
      margin: 20px auto;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 20px 0;
    }
    .buttons button {
      background-color: #00bcd4;
      color: white;
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .preview-box {
      width: 350px;
      height: 350px;
      border: 3px solid blue;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-box img {
      max-width: 100%;
      max-height: 100%;
    }
    #log {
      margin-top: 15px;
      background: #f1f1f1;
      padding: 10px;
      border-radius: 5px;
      min-height: 40px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-text">LHI LECCE MEDICAL HOTEL ITALIA.</div>
    <div class="link-line"><a href="https://www.lhilecce.it" target="_blank">www.lhilecce.it</a></div>
    <div class="description">
      <span class="green">CROWNFUNDING INTERNATIONAL</span> su blockchain Polygon (Matic-Ethereum)<br>
      Progetto di ricerca medica: <span class="red">FIBROMIALGIA</span> & <span class="darkgreen">DEPRESSIONE</span>
    </div>

    <button id="connect-btn">Connetti Metamask</button>
    <div class="buttons" id="button-grid"></div>

    <div class="preview-box">
      <img id="preview" src="" alt="Anteprima NFT">
    </div>

    <input type="number" id="quantity" value="1" min="1" max="10">
    <button id="mint-btn" disabled>Mint NFT</button>
    <div id="log">Status: In attesa di connessione...</div>
  </div>

  <script>
    const CONTRACT_ADDRESS = "0x6a6d5Dc29ad8ff23209186775873e123b31c26E9";
    const CONTRACT_ABI = [
      {"inputs":[{"internalType":"string","name":"_baseURI","type":"string"},{"internalType":"address","name":"_owner","type":"address"},{"internalType":"address","name":"_paymentToken","type":"address"}],"stateMutability":"nonpayable","type":"constructor"},
      {"inputs":[{"internalType":"uint256","name":"tokenId","type":"uint256"},{"internalType":"uint256","name":"amount","type":"uint256"},{"internalType":"bool","name":"stake","type":"bool"}],"name":"mintNFT","outputs":[],"stateMutability":"payable","type":"function"},
      {"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"pricesInWei","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"}
    ];

    const IPFS_CID = "bafybeihtvxoq6ak2yaayltdcpxz6fh5rdrzptmygdvhxhz6ai73tsj26yi";
    let provider, signer, contract;

    const connectBtn = document.getElementById('connect-btn');
    const mintBtn = document.getElementById('mint-btn');
    const logDiv = document.getElementById('log');
    const previewImg = document.getElementById('preview');
    const quantityInput = document.getElementById('quantity');
    const buttonGrid = document.getElementById('button-grid');

    connectBtn.onclick = async () => {
      if (!window.ethereum) {
        log('❌ Installa Metamask.');
        return;
      }
      try {
        await window.ethereum.request({ method: 'eth_requestAccounts' });
        provider = new ethers.providers.Web3Provider(window.ethereum);
        signer = provider.getSigner();
        contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
        log('✅ Connesso a Metamask!');
        mintBtn.disabled = false;
      } catch (err) {
        log('❌ Errore connessione: ' + err.message);
      }
    };

    function selectImage(tokenId) {
      const padded = tokenId.toString().padStart(2, '0');
      const extensions = ['.jpg', '.JPG'];
      previewImg.src = '';
      log('🔍 Caricamento anteprima...');
      let found = false;

      extensions.forEach(ext => {
        const url = `https://gateway.pinata.cloud/ipfs/${IPFS_CID}/${padded}${ext}`;
        fetch(url, { method: 'HEAD' }).then(res => {
          if (res.ok && !found) {
            previewImg.src = url;
            found = true;
            log(`✅ Anteprima caricata per Token #${tokenId}`);
            previewImg.alt = `Anteprima LHI #${tokenId}`;
          }
        });
      });
    }

    mintBtn.onclick = async () => {
      const tokenId = parseInt(previewImg.alt.replace(/\D/g, ''));
      const quantity = parseInt(quantityInput.value);
      if (!tokenId) return log("❗ Seleziona un NFT prima di mintare.");
      try {
        const price = await contract.pricesInWei(tokenId);
        const totalPrice = price.mul(quantity);
        log(`⏳ Minting token ${tokenId}...`);
        const tx = await contract.mintNFT(tokenId, quantity, false, { value: totalPrice });
        await tx.wait();
        log('✅ Mint completato! Hash: ' + tx.hash);
      } catch (err) {
        log('❌ Errore mint: ' + (err.data?.message || err.message));
      }
    };

    function log(message) {
      logDiv.textContent = message;
    }

    // Inizializza i pulsanti
    window.onload = () => {
      for (let i = 1; i <= 24; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.onclick = () => selectImage(i);
        buttonGrid.appendChild(btn);
      }
      selectImage(1); // Mostra di default la prima anteprima
    };
  </script>
</body>
</html>
